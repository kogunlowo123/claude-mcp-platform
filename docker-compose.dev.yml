version: "3.9"

services:
  mcp-platform:
    build:
      context: .
      dockerfile: Dockerfile
      target: base
    container_name: mcp-platform-dev
    command: bun run --watch src/index.ts
    ports:
      - "${MCP_PORT:-3000}:3000"
    env_file:
      - .env.dev
    volumes:
      - ./src:/app/src
      - ./tsconfig.json:/app/tsconfig.json
      - node_modules:/app/node_modules
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - mcp-network

networks:
  mcp-network:
    driver: bridge

volumes:
  node_modules:
    driver: local
