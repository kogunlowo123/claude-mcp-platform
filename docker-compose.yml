version: "3.9"

services:
  mcp-platform:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcp-platform
    ports:
      - "${MCP_PORT:-3000}:3000"
    environment:
      MCP_PORT: 3000
      MCP_HOST: "0.0.0.0"
      MCP_LOG_LEVEL: "${MCP_LOG_LEVEL:-info}"
      MCP_HEALTH_INTERVAL: "${MCP_HEALTH_INTERVAL:-30000}"
      MCP_REQUEST_TIMEOUT: "${MCP_REQUEST_TIMEOUT:-10000}"
      MCP_MAX_RETRIES: "${MCP_MAX_RETRIES:-3}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - mcp-network
    volumes:
      - mcp-data:/app/data

networks:
  mcp-network:
    driver: bridge

volumes:
  mcp-data:
    driver: local
